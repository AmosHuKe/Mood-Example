name: moodexample
description: 管理自己的情绪，记录当下所见所想。
publish_to: 'none'
version: 1.9.12+499

environment:
  sdk: 3.11.5
  flutter: 3.41.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: # l10n
    sdk: flutter

  # 基础
  intl: 0.20.2 # 国际化
  path: 1.9.1
  path_provider: 2.1.5 # 路径
  provider: 6.1.5+1 # 状态管理
  logging: 1.3.0
  go_router: 17.2.2 # 路由管理

  # 存储
  sqflite: 2.4.2+1 # 数据库
  shared_preferences: 2.5.5 # 共享存储

  # 功能/集成
  excel: 4.0.6 # Excel
  share_plus: 12.0.1 # 分享
  file_picker: 11.0.2 # 文件选择
  webview_flutter: 4.13.1 # WebView
  awesome_notifications: 0.11.0 # 本地通知
  ditredi: 2.0.2 # 3D 数据集显示

  # UI
  flutter_zoom_drawer: 3.2.0 # 缩放抽屉
  flutter_smart_dialog: 5.1.0 # Dialog
  table_calendar: 3.2.0 # 日历
  flutter_slidable: 4.0.3 # 滑动操作项
  card_swiper: 3.0.1 # 轮播
  fl_chart: 1.2.0 # 图表
  flutter_screen_lock: 9.2.2+2 # 密码锁
  flutter_tilt: 3.3.4 # 倾斜视差
  remixicon: 1.4.1 # Remixicon

  # 游戏相关
  bonfire: 3.17.2 # 游戏引擎
  flame: 1.37.0 # 游戏引擎

  # 本地认证
  local_auth: 3.0.1 # 本地认证
  local_auth_android: 2.0.8 # Android 本地认证
  local_auth_darwin: 2.0.3 # iOS/macOS 本地认证

# https://dart.dev/tools/pub/dependencies#dependency-overrides
dependency_overrides:

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: any

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/onboarding/
    - assets/images/woolly/
    - assets/3d/city/
    - assets/images/game/mini_fantasy/
    - assets/images/game/mini_fantasy/tiles/
    - assets/images/game/mini_game/
    - assets/images/game/mini_game/tiles/
    - assets/images/game/mini_game/enemy/orc/
    - assets/images/game/mini_game/enemy/boss/
    - assets/images/game/mini_game/player/human/
